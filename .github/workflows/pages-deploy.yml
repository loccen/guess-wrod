name: Pages Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CLOUDFLARE_ACCOUNT_ID: 656612e8bac6e750ae630a5ad3320858

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 选择本次手动发布目标
        required: true
        type: choice
        default: preview
        options:
          - preview
          - production

permissions:
  contents: read
  deployments: write

concurrency:
  group: pages-deploy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: 判定是否需要发布
    runs-on: ubuntu-latest
    outputs:
      deploy_needed: ${{ steps.detect.outputs.deploy_needed }}
      changed_files: ${{ steps.detect.outputs.changed_files }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 判定变更范围
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "deploy_needed=true" >> "$GITHUB_OUTPUT"
            echo "changed_files=workflow_dispatch" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
            if [[ -z "$base_sha" || "$base_sha" == "0000000000000000000000000000000000000000" ]]; then
              base_sha="$(git rev-parse "${head_sha}^" 2>/dev/null || true)"
            fi
          fi

          if [[ -z "${base_sha:-}" ]]; then
            changed_files="$(git diff-tree --no-commit-id --name-only -r "$head_sha")"
          else
            changed_files="$(git diff --name-only "$base_sha" "$head_sha")"
          fi

          printf '本次变更文件:\n%s\n' "${changed_files:-<none>}"

          deploy_needed=false
          if printf '%s\n' "$changed_files" | grep -Eq '^(functions/|src/|data/|migrations/|index\.html$|package(-lock)?\.json$|tsconfig(\..+)?\.json$|vite\.config\.ts$|wrangler\.jsonc$)'; then
            deploy_needed=true
          fi

          {
            echo "deploy_needed=$deploy_needed"
            echo "changed_files<<EOF"
            printf '%s\n' "$changed_files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  validate:
    name: 校验
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        if: needs.changes.outputs.deploy_needed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 安装依赖
        if: needs.changes.outputs.deploy_needed == 'true'
        run: npm ci

      - name: 运行仓库校验
        if: needs.changes.outputs.deploy_needed == 'true'
        run: npm run ci:check

      - name: 跳过说明
        if: needs.changes.outputs.deploy_needed != 'true'
        run: |
          echo "本次改动未触及 Pages 运行时业务路径，跳过完整校验与发布。"
          echo "${{ needs.changes.outputs.changed_files }}"

  deploy_preview:
    name: 手动部署 Preview
    runs-on: ubuntu-latest
    needs:
      - changes
      - validate
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_target == 'preview' && needs.changes.outputs.deploy_needed == 'true'
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 构建产物
        run: npm run build

      - name: 发布到 Cloudflare Pages Preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: >-
          npx wrangler pages deploy dist
          --project-name=guess-wrod
          --branch=${{ github.ref_name }}
          --commit-hash=${{ github.sha }}

  deploy_production:
    name: 部署 Production
    runs-on: ubuntu-latest
    needs:
      - changes
      - validate
    if: needs.changes.outputs.deploy_needed == 'true' && ((github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.deploy_target == 'production' && github.ref == 'refs/heads/main'))
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 构建产物
        run: npm run build

      - name: 确认 Cloudflare 账号
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler whoami

      - name: 发布到 Cloudflare Pages Production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: >-
          npx wrangler pages deploy dist
          --project-name=guess-wrod
          --branch=main
          --commit-hash=${{ github.sha }}
